events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream auth_service {
    server auth-service:8002;
  }
  upstream user_service {
    server user-service:8004;
  }
  upstream product_service {
    server product-service:8003;
  }
  upstream order_service {
    server order-service:8005;
  }
  upstream chat_service {
    server chat-service:8006;
  }
  upstream frontend_service {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    location /api/auth/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      set $auth_upstream http://auth-service:8002;
      rewrite ^/api/auth/(.*)$ /$1 break;
      proxy_pass $auth_upstream;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Host $host;
    }

    location /api/users/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      set $user_upstream http://user-service:8004;
      rewrite ^/api/users/(.*)$ /$1 break;
      proxy_pass $user_upstream;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Host $host;
    }

    location /api/products/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      set $product_upstream http://product-service:8003;
      rewrite ^/api/products/(.*)$ /$1 break;
      proxy_pass $product_upstream;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Host $host;
    }

    location /api/orders/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      set $order_upstream http://order-service:8005;
      rewrite ^/api/orders/(.*)$ /$1 break;
      proxy_pass $order_upstream;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Host $host;
    }

    location = /api/orders {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      set $order_upstream http://order-service:8005;
      proxy_pass $order_upstream/;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Host $host;
    }

    location /api/analytics/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      set $order_upstream http://order-service:8005;
      rewrite ^/api/analytics/(.*)$ /analytics/$1 break;
      proxy_pass $order_upstream;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Host $host;
    }

    location /api/ml/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      set $order_upstream http://order-service:8005;
      rewrite ^/api/ml/(.*)$ /ml/$1 break;
      proxy_pass $order_upstream;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Host $host;
    }

    location /api/chat/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      set $chat_upstream http://chat-service:8006;
      rewrite ^/api/chat/(.*)$ /$1 break;
      proxy_pass $chat_upstream;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://frontend_service/;
      proxy_set_header Host $host;
    }
  }
}
