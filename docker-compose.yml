services:
  logistics_db:
    image: postgres:15
    container_name: logistics_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=logistics_risk_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logistics_network

  ml_service:
    build:
      context: .
      dockerfile: ml_service/Dockerfile
    container_name: ml_service
    ports:
      - "8001:8001"
    networks:
      - logistics_network

  auth-service:
    build: .
    image: logistics_app_base:latest
    container_name: auth_service
    command: uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    depends_on:
      - logistics_db
    networks:
      - logistics_network

  user-service:
    image: logistics_app_base:latest
    container_name: user_service
    command: uvicorn services.user_service.main:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - ALGORITHM=${ALGORITHM:-HS256}
    depends_on:
      - logistics_db
    networks:
      - logistics_network

  product-service:
    image: logistics_app_base:latest
    container_name: product_service
    command: uvicorn services.product_service.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    networks:
      - logistics_network

  order-service:
    image: logistics_app_base:latest
    container_name: order_service
    command: uvicorn services.order_service.main:app --host 0.0.0.0 --port 8005
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - ALGORITHM=${ALGORITHM:-HS256}
      - PRODUCT_SERVICE_URL=http://product-service:8003
      - ML_SERVICE_URL=http://ml_service:8001
    depends_on:
      - logistics_db
      - product-service
      - ml_service
    networks:
      - logistics_network

  chat-service:
    image: logistics_app_base:latest
    container_name: chat_service
    command: uvicorn services.chat_service.main:app --host 0.0.0.0 --port 8006
    ports:
      - "8006:8006"
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - ALGORITHM=${ALGORITHM:-HS256}
    networks:
      - logistics_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: logistics_frontend
    ports:
      - "3002:80"
    networks:
      - logistics_network

  gateway:
    image: nginx:1.27-alpine
    container_name: api_gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service
      - frontend
    networks:
      - logistics_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml 
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service
      - ml_service
    networks:
      - logistics_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - logistics_network

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"
    networks:
      - logistics_network

volumes:
  postgres_data:

networks:
  logistics_network: