global:
  scrape_interval: 15s 

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'auth_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-service:8002']

  - job_name: 'user_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['user-service:8004']

  - job_name: 'product_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['product-service:8003']

  - job_name: 'order_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['order-service:8005']

  - job_name: 'chat_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['chat-service:8006']

  - job_name: 'ml_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ml_service:8001']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']