global:
  scrape_interval: 15s 

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'logistics_app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['logistics_app:8000']   

  - job_name: 'ml_service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ml_service:8001']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']